---
######################################################
# /usr/bin/ansible-playbook \
#   playbooks/oc-mirror-create-connected.yaml \
#   -i inventory.yaml \
#   -e @vault/quay_secrets.yaml \
#   --vault-password-file \
#   .vault_password
######################################################
- name: Create Mirror
  hosts: connected_mirror
  become: true
  tasks:
    - name: Populate Mirror
      ansible.builtin.include_role:
        name: "../roles/oc-mirror"
        tasks_from: connected-mirror
        apply:
          become: true
